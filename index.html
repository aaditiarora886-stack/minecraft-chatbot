<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berry</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: #1a0a1a;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(255,182,215,0.04) 31px, rgba(255,182,215,0.04) 32px),
        repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(255,182,215,0.04) 31px, rgba(255,182,215,0.04) 32px);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #app {
      width: 440px;
      height: 620px;
      background: #2d0f2d;
      border: 4px solid #ff69b4;
      box-shadow:
        0 0 0 4px #1a0a1a,
        0 0 0 8px #ff69b4,
        8px 8px 0 8px #000,
        0 0 40px rgba(255,105,180,0.3);
      display: flex;
      flex-direction: column;
      image-rendering: pixelated;
    }

    #header {
      background: #ff69b4;
      padding: 0;
      border-bottom: 4px solid #c41e7a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      image-rendering: pixelated;
    }

    #header-title {
      background: #ff69b4;
      padding: 10px 14px;
      font-size: 9px;
      color: #fff;
      text-shadow: 2px 2px 0 #c41e7a;
      letter-spacing: 1px;
      flex: 1;
    }

    .pixel-hearts {
      padding: 8px 12px;
      display: flex;
      gap: 4px;
    }

    .heart {
      width: 12px; height: 12px;
      background: #ff0066;
      clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 50%, 50% 100%, 0% 50%, 0% 25%);
      image-rendering: pixelated;
      animation: heartbeat 1.2s infinite;
    }
    .heart:nth-child(2) { animation-delay: 0.2s; background: #ff66aa; }
    .heart:nth-child(3) { animation-delay: 0.4s; background: #ffaacc; }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: #ff69b4 #1a0a1a;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: #1a0a1a; }
    #messages::-webkit-scrollbar-thumb { background: #ff69b4; }

    .msg { display: flex; gap: 8px; align-items: flex-start; max-width: 95%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      flex-shrink: 0;
      image-rendering: pixelated;
      border: 2px solid #ff69b4;
    }

    .bubble {
      padding: 10px 12px;
      font-size: 8px;
      line-height: 2;
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
      border: 3px solid;
      position: relative;
    }

    .bot .bubble {
      background: #3d1a3d;
      border-color: #ff69b4;
      color: #ffccee;
      box-shadow: 3px 3px 0 #000;
    }
    .bot .bubble::before {
      content: '';
      position: absolute;
      left: -10px; top: 8px;
      border: 5px solid transparent;
      border-right-color: #ff69b4;
    }

    .user .bubble {
      background: #ff69b4;
      border-color: #fff;
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
      box-shadow: 3px 3px 0 #000;
    }
    .user .bubble::after {
      content: '';
      position: absolute;
      right: -10px; top: 8px;
      border: 5px solid transparent;
      border-left-color: #fff;
    }

    .name-tag {
      font-size: 6px;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .bot .name-tag { color: #ff69b4; }
    .user .name-tag { color: #ffccee; text-align: right; }

    .msg-inner { display: flex; flex-direction: column; }
    .user .msg-inner { align-items: flex-end; }

    .typing-bubble {
      display: flex; gap: 6px; align-items: center;
      padding: 12px 14px;
    }
    .typing-bubble span {
      width: 8px; height: 8px;
      background: #ff69b4;
      border: 2px solid #ff0066;
      animation: blink 1s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    #input-row {
      padding: 10px 12px;
      border-top: 4px solid #ff69b4;
      background: #1a0a1a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 8px 10px;
      border: 3px solid #ff69b4;
      background: #2d0f2d;
      color: #ffccee;
      font-size: 8px;
      font-family: 'Press Start 2P', monospace;
      resize: none;
      outline: none;
      line-height: 1.8;
      max-height: 80px;
      overflow-y: auto;
      box-shadow: inset 2px 2px 0 #000;
    }
    #user-input::placeholder { color: #994477; }
    #user-input:focus { border-color: #fff; }

    #send-btn {
      padding: 8px 12px;
      border: 3px solid #fff;
      background: #ff69b4;
      color: #fff;
      font-size: 8px;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      box-shadow: 3px 3px 0 #000;
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #ff0066; }
    #send-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #footer-bar {
      background: #1a0a1a;
      border-top: 2px solid #551133;
      padding: 5px 12px;
      font-size: 6px;
      color: #994477;
      letter-spacing: 1px;
      text-align: center;
    }

    @keyframes pixelIn {
      0% { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .msg { animation: pixelIn 0.15s steps(3) both; }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="header-title">✦ BERRY ✦</div>
    <div class="pixel-hearts">
      <div class="heart"></div>
      <div class="heart"></div>
      <div class="heart"></div>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <img class="avatar" src="grass_block.jpg" alt="bot avatar" onerror="this.style.background='#ff69b4';this.removeAttribute('src')">
      <div class="msg-inner">
        <div class="name-tag">✦ PIXIE_BOT</div>
        <div class="bubble">Heyyy! Welcome! I'm your pixel pal~ Ask me anything! ♡</div>
      </div>
    </div>
  </div>

  <div id="input-row">
    <textarea id="user-input" placeholder="say something..." rows="1"></textarea>
    <button id="send-btn">SEND ▶</button>
  </div>

  <div id="footer-bar">♡ press enter to chat ♡</div>
</div>

<script>
  // ====================================================
  // PASTE YOUR ANTHROPIC API KEY HERE
  const API_KEY = "YOUR_API_KEY_HERE";
  // ====================================================

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const btnEl      = document.getElementById('send-btn');

  let history = [];

  function scrollDown() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBubble(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const img = document.createElement('img');
    img.className = 'avatar';
    img.src = 'grass_block.jpg';
    img.alt = role === 'bot' ? 'bot' : 'you';
    img.onerror = function(){ this.style.background = role === 'bot' ? '#ff69b4' : '#c41e7a'; this.removeAttribute('src'); };
    wrap.appendChild(img);

    const inner = document.createElement('div');
    inner.className = 'msg-inner';

    const name = document.createElement('div');
    name.className = 'name-tag';
    name.textContent = role === 'bot' ? '✦ PIXIE_BOT' : '✦ YOU';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    inner.appendChild(name);
    inner.appendChild(bubble);
    wrap.appendChild(inner);
    messagesEl.appendChild(wrap);
    scrollDown();
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing';

    const img = document.createElement('img');
    img.className = 'avatar';
    img.src = 'grass_block.jpg';
    img.alt = 'bot';

    const inner = document.createElement('div');
    inner.className = 'msg-inner';

    const name = document.createElement('div');
    name.className = 'name-tag';
    name.textContent = '✦ PIXIE_BOT';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    inner.appendChild(name);
    inner.appendChild(bubble);
    wrap.appendChild(img);
    wrap.appendChild(inner);
    messagesEl.appendChild(wrap);
    scrollDown();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    btnEl.disabled = true;

    addBubble('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-allow-browser': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          system: 'You are a cheerful, friendly AI assistant with a cute kawaii personality. Keep responses concise and warm. Use occasional cute expressions but stay helpful.',
          messages: history
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addBubble('bot', '⚠ Error: ' + data.error.message);
        history.pop();
      } else {
        const reply = data.content.map(b => b.text || '').join('');
        history.push({ role: 'assistant', content: reply });
        addBubble('bot', reply);
      }

    } catch (err) {
      removeTyping();
      addBubble('bot', '⚠ Network error. Check your API key!');
      history.pop();
    }

    btnEl.disabled = false;
    inputEl.focus();
  }

  btnEl.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
  });
</script>

</body>
</html>
